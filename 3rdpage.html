<!DOCTYPE html>
<body>
    <title>inputs</title>

    <div id="inputs">
        <form>
        <h1>Input personal data</h1>
            <label for="data">input data</label>
                <input type="text" name="data_entry" id="data" />
            <label for="password">input password</label>
                <input type="password" name="usr_password" id="password" />
        </form>
    </div>
    <h2>break</h2>
    <div>
        <h1>age input</h1>
        <form>
            <label for="age">input age: </label>
                <input type="number" id="age" name="age" />
        </form>
    </div>

    <div>
        <h1>slider input</h1>
        <form>
            <label for="like">r8 website</label>
                <span>no</span>
                <input type="range" id="like" name="like_website" min="1" max="5" step="1" />
                <span>yes</span>
        </form>
    </div>

    <div>
        <h1>checkboxes</h1>
        <img src="https://i.guim.co.uk/img/media/591d5c85faace0776df8f2ca3aec6ed277257582/0_410_3648_2189/master/3648.jpg?width=1200&height=900&quality=85&auto=format&fit=crop&s=024507240a5815b7a21b2812d424dd38" width="600" height="600" />
        <form>
            <input id="yes" type="radio" name="r8" value="yes" />
            <label for="yes">ye</label>

            <input id="no" type="radio" name="r8" value="no" />
            <label for="no">nah</label>

        </form>
    </div>

    <div>
        <h1>datalists</h1>
        <form>
            <label for="bias">which one</label>
            <input id="bias" type="text" list="biases" name="bias" />
                <datalist id="bias">
                    <option value="bruh"></option>
                    <option value="iu"></option>
                    <option value="ui"></option>
                </datalist>
        </form>
    </div>
    <div>
        <h1>textareainput</h1>
        <form>
            <label for="bigtext">enter some text</label>
            <input id="bigtext" type="text" name="bigtext" />
                <textarea id="bigtext" name="bigtext" rows="5" cols="40">Enter text</textarea>
            <input type="submit" value="bruh" />
        </form>
    </div>

    


</body>
